<section class="container register-form-style">
    <h4 class="text-black text-center mb-4">S'INSCRIRE</h4>
    <form class="d-flex flex-column align-items-center">
        <div class="mb-3">
            <label for="idInputReg" class="form-label text-black">Pseudo :</label>
            <input type="text" class="form-control" id="idInputReg">
        </div>
        <div class="mb-3">
            <label for="emailInputReg" class="form-label text-black">Email :</label>
            <input type="email" class="form-control" id="emailInputReg">
        </div>
        <div class="mb-3">
            <label for="nomInputReg" class="form-label text-black">Nom :</label>
            <input type="text" class="form-control" id="nomInputReg">
        </div>
        <div class="mb-3">
            <label for="prenomInputReg" class="form-label text-black">Prénom :</label>
            <input type="text" class="form-control" id="prenomInputReg">
        </div>
        <div class="mb-3">
            <label for="pwdInputReg" class="form-label text-black">Mot de passe :</label>
            <input type="password" class="form-control" id="pwdInputReg">
        </div>
        <button type="submit" class="btn btn-dark text-white">Se créer un compte</button>
    </form>
</section>
