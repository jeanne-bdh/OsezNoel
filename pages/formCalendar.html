<section class="bg-form">

    <div class="container-fluid container-form-style bg-secondary" id="form-calendar"">
        <h4 class=" text-black text-center mb-5 fs-4" id="title-createCalendar">Créer un nouveau calendrier</h4>
        <form class="px-5">
            <div class="mb-3">
                <label for="nameInputCreate" class="form-label text-black">Nom du calendrier :</label>
                <input type="text" class="form-control" id="nameInputCreate">
            </div>

            <!-- Durée : calendrier pour choisir les dates, 24 jours sinon msg d'erreur -->
            <div class="mb-3">
                <label for="timeInputCreate" class="form-label text-black">Durée (24 jours) :</label>
                <input type="date" class="form-control" id="timeInputCreate" required>
                <div class="invalid-feedback">
                    La durée doit faire 24 jours
                </div>
            </div>

            <!-- Choix du thème : modal avec modèles en petits -->
            <div class="mb-3">
                <label for="themeInputCreate" class="form-label text-black">Choix du thème :</label>
                <input type="#" class="form-control" id="themeInputCreate" required>
                <div class="invalid-feedback">
                    Vous devrez choisir un thème
                </div>
            </div>
            <div class="text-center pt-3">
                <button type="submit" class="btn btn-dark dark-button px-4 py-2" id="btn-validCreate">Créer</button>
            </div>
        </form>
    </div>

    <footer class="container my-3">
        <hr class="w-75 mx-auto text-white border-2 rounded-5">
        <p class="text-center text-white">&copy; 2024 Osez Noël - Tous droits réservés - <a class="text-white"
                href="/legalinfos">Mentions légales</a>
        </p>
    </footer>
</section>
