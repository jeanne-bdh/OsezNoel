<section class="bg-home">

    <div class="container container-form-style">
        <h4 class="text-black text-center mb-4">CONNEXION</h4>
        <form class="d-flex flex-column align-items-center">
            <div class="mb-3">
                <label for="idInputCo" class="form-label text-black">Identifiant :</label>
                <input type="text" class="form-control" id="idInputCo">
                <div class="invalid-feedback">
                    Veuillez entrer un identifiant ayant entre 3 à 20 caractères
                </div>
            </div>
            <div class="mb-3">
                <label for="passwordInputCo" class="form-label text-black">Mot de passe :</label>
                <input type="password" class="form-control" id="passwordInputCo">
                <div class="invalid-feedback">
                    Le mot de passe doit contenir au moins 8 caractères comprenant une lettre majuscule, une
                    minuscule, un chiffre et un caractère
                    spécial
                </div>
            </div>
            <button type="submit" class="btn btn-dark text-white" id="btn-validCo">Se connecter</button>
        </form>
    </div>

    <!-- FOOTER LOGIN (= HOME) -->

    </footer>

</section>
