<section class="container container-form-style d-flex flex-column justify-content-center align-items-center w-75">
    <div>
        <h4>CONNEXION</h4>

        <form action="/pages/auth/loginPost.php" method="POST">
            <div class="row my-5">
                <label for="idInputCo" class="col-sm-2 col-form-label">Identifiant :</label>
                <div class="col-sm-10">
                    <input type="text" name="idCo" class="form-control" id="idInputCo" required>
                    <div class="invalid-feedback">

                    </div>

            </div>
