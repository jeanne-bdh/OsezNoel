<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload d'Images et de Vidéos</title>
    <!-- Lien CSS Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Télécharger des Fichiers</h1>
        <form id="uploadForm">
            <div class="mb-3">
                <label for="fileInput" class="form-label">Choisissez une image ou vidéo</label>
                <div class="input-group">
                    <input type="file" class="form-control" id="fileInput" accept="image/*,video/*">
                    <button class="btn btn-primary" type="button" id="uploadBtn">Télécharger</button>
                </div>
                <div class="form-text">Formats acceptés : JPEG, PNG, MP4, etc.</div>
            </div>
        </form>
        <div id="preview" class="mt-4">
            <!-- Aperçu des fichiers sera affiché ici -->
        </div>
    </div>

    <!-- Lien JS Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Script JS -->
    <script>
        // Gestionnaire pour afficher un aperçu des fichiers téléchargés
        document.getElementById('uploadBtn').addEventListener('click', function() {
            const fileInput = document.getElementById('fileInput');
            const preview = document.getElementById('preview');
            preview.innerHTML = ''; // Réinitialise l'aperçu

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const fileReader = new FileReader();

                fileReader.onload = function(event) {
                    const fileURL = event.target.result;
                    if (file.type.startsWith('image/')) {
                        // Si c'est une image
                        preview.innerHTML = `<img src="${fileURL}" class="img-fluid rounded" alt="Aperçu">`;
                    } else if (file.type.startsWith('video/')) {
                        // Si c'est une vidéo
                        preview.innerHTML = `
                            <video controls class="w-100">
                                <source src="${fileURL}" type="${file.type}">
                                Votre navigateur ne supporte pas la lecture des vidéos.
                            </video>
                        `;
                    } else {
                        preview.innerHTML = `<p class="text-danger">Type de fichier non supporté.</p>`;
                    }
                };

                fileReader.readAsDataURL(file);
            } else {
                preview.innerHTML = `<p class="text-warning">Aucun fichier sélectionné.</p>`;
            }
        });
    </script>
</body>
</html>
