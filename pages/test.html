<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grille de 24 cases</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .num-box {
            border: 1.5px solid #000;
            border-radius: 10px;
            width: 100%; /* S'adapte à la colonne */
            height: 100px; /* Hauteur des cases */
            background-color: rgba(0, 123, 255, 0.5); /* Couleur avec transparence */
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            font-size: 1.5rem;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="row row-cols-6 g-2">
            <!-- Génération des 24 cases -->
            <!-- Exemple : boucle sur les numéros -->
            <div class="col">
                <div class="num-box">1</div>
            </div>
            <div class="col">
                <div class="num-box">2</div>
            </div>
            <!-- Continuez jusqu'à 24 -->
        </div>
    </div>

    <!-- Bootstrap JavaScript (optionnel) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
